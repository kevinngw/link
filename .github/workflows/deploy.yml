name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'dev']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set base path
        id: base
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VITE_BASE=/link/" >> "$GITHUB_OUTPUT"
            echo "DEST_DIR=." >> "$GITHUB_OUTPUT"
          else
            echo "VITE_BASE=/link/${{ github.ref_name }}/" >> "$GITHUB_OUTPUT"
            echo "DEST_DIR=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.base.outputs.VITE_BASE }}
          VITE_OBA_KEY: ${{ secrets.VITE_OBA_KEY || 'TEST' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.base.outputs.DEST_DIR }}
          keep_files: true
