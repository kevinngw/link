name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'dev']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deployment paths
        id: deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VITE_BASE=/link/" >> "$GITHUB_OUTPUT"
            echo "TARGET_DIR=." >> "$GITHUB_OUTPUT"
          else
            echo "VITE_BASE=/link/${{ github.ref_name }}/" >> "$GITHUB_OUTPUT"
            echo "TARGET_DIR=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.deploy.outputs.VITE_BASE }}

      - name: Publish to gh-pages
        env:
          TARGET_DIR: ${{ steps.deploy.outputs.TARGET_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/gh-pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/gh-pages
          else
            git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/gh-pages
            cd /tmp/gh-pages
            git switch --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd "$GITHUB_WORKSPACE"
          fi

          cd /tmp/gh-pages

          if [ "$TARGET_DIR" = "." ]; then
            find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'dev' -exec rm -rf {} +
            cp -R "$GITHUB_WORKSPACE"/dist/. .
          else
            rm -rf "$TARGET_DIR"
            mkdir -p "$TARGET_DIR"
            cp -R "$GITHUB_WORKSPACE"/dist/. "$TARGET_DIR"/
          fi

          touch .nojekyll

          git add -A

          if git diff --cached --quiet --exit-code; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy ${GITHUB_REF_NAME}"
          git push origin gh-pages
