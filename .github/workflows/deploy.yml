name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'dev']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set deploy config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VITE_BASE=/link/" >> $GITHUB_ENV
            echo "DEST_DIR=." >> $GITHUB_ENV
          else
            echo "VITE_BASE=/link/${{ github.ref_name }}/" >> $GITHUB_ENV
            echo "DEST_DIR=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ env.VITE_BASE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ env.DEST_DIR }}
          keep_files: true
